- name: Prepare servers, deploy application and setup monitoring
  hosts: webservers
  become: true

  vars:
    app_image: "nginx:latest"
    app_container_name: "web-app"
    app_port: 80

    datadog_api_key: "{{ vault_datadog_api_key }}"
    datadog_site: "datadoghq.com"

    datadog_checks:
      http_check:
        init_config:
        instances:
          - name: "web-app"
            url: "http://localhost:80"
            timeout: 5

  roles:
    - role: geerlingguy.pip
      tags:
        - prepare

    - role: geerlingguy.docker
      tags:
        - prepare

    - role: datadog.datadog
      tags:
        - monitoring

  tasks:
    - name: Deploy application container
      community.docker.docker_container:
        name: "{{ app_container_name }}"
        image: "{{ app_image }}"
        state: started
        restart_policy: always
        published_ports:
          - "{{ app_port }}:80"
      tags:
        - deploy
